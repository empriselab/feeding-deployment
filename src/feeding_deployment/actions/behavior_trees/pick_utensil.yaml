name: "Root"
description: "Pick up the utensil from the tool mount."
type: "Sequence"
children:
  - name: "MoveToRetractPos"
    description: "Move to the retract position."
    type: "Behavior"
    parameters:
      - name: "RetractPosition"
        description: "The retract position of the robot."
        space:
          type: "Box"
          lower: !hla arm_joint_lower_limits
          upper: !hla arm_joint_upper_limits
        is_user_editable: False
        value: !scene_description retract_pos
    fn: !hla move_to_joint_positions
  - name: "CloseGripper"
    description: "Close the gripper."
    type: "Behavior"
    parameters: []
    fn: !hla close_gripper
  - name: "MoveToUtensilAboveMountPos"
    description: "Move to a position just above the utensil mount."
    type: "Behavior"
    parameters:
      - name: "UtensilAboveMountPos"
        description: "The position just above the utensil mount."
        space:
          type: "Box"
          lower: !hla arm_joint_lower_limits
          upper: !hla arm_joint_upper_limits
        is_user_editable: False
        value: !scene_description utensil_above_mount_pos
    fn: !hla move_to_joint_positions
  - name: "MoveUtensilInsideMount"
    description: "Move to inside the utensil mount."
    type: "Behavior"
    parameters:
      - name: "UtensilInsideMountEE"
        description: "The position inside the utensil mount."
        space:
          type: "PoseSpace"
        is_user_editable: False
        value: !scene_description utensil_inside_mount
    fn: !hla move_to_ee_pose
  - name: "GraspUtensil"
    description: "Grasp the utensil."
    type: "Behavior"
    parameters:
      - name: "Tool"
        description: "The type of tool to grasp."
        space:
          type: "Enum"
          elements: ["utensil", "drink", "wipe"]
        is_user_editable: False
        value: "utensil"
    fn: !hla grasp_tool
  - name: "MoveUtensilOutsideMount"
    description: "Move to outside the utensil mount."
    type: "Behavior"
    parameters:
      - name: "MoveUtensilOutsideMountEE"
        description: "The position outside the utensil mount."
        space:
          type: "PoseSpace"
        is_user_editable: False
        value: !scene_description utensil_outside_mount
    fn: !hla move_to_ee_pose
  # Assuming here self.sim.scene_description.scene_label == "vention"
  - name: "MoveUtensilOutsideAboveMount"
    description: "Move a bit above the utensil mount."
    type: "Behavior"
    parameters:
      - name: "MoveUtensilOutsideAboveMountEE"
        description: "The position above the utensil mount."
        space:
          type: "PoseSpace"
        is_user_editable: False
        value: !scene_description utensil_outside_above_mount
    fn: !hla move_to_ee_pose
  - name: "MoveToRetractPos"
    description: "Move to the retract position."
    type: "Behavior"
    parameters:
      - name: "RetractPosition"
        description: "The retract position of the robot."
        space:
          type: "Box"
          lower: !hla arm_joint_lower_limits
          upper: !hla arm_joint_upper_limits
        is_user_editable: False
        value: !scene_description retract_pos
    fn: !hla move_to_joint_positions
  # Pre-emptively move to the before_transfer_pos because moving to above_plate_pos
  # from retract_pos is unsafe.
  - name: "MoveToBeforeTransferPos"
    description: "Move to the before transfer position."
    type: "Behavior"
    parameters:
      - name: "BeforeTransferPos"
        description: "The before transfer position of the robot."
        space:
          type: "Box"
          lower: !hla arm_joint_lower_limits
          upper: !hla arm_joint_upper_limits
        is_user_editable: False
        value: !scene_description before_transfer_pos
    fn: !hla move_to_joint_positions
