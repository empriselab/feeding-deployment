name: "AcquireBite"
description: "Pick up the appropriate food item from the plate."
type: "Behavior"
parameters:
  - name: "Speed"
    description: "Speed of the robot during bite acquisition."
    space:
      type: Enum
      elements: ["low", "medium", "high"]
    is_user_editable: True
    value: "medium"
  - name: "TimeToWaitBeforeAutocontinue"
    description: "Time to wait before auto-continuing pickup bite button on the webapp."
    space:
      type: "Box"
      lower: 5.0
      upper: 100.0
    is_user_editable: True
    value: 10.0
  - name: "TransferAskForConfirmation"
    description: "Ask for confirmation on the web app before initiating the transfer sequence for a bite."
    space:
      type: "Enum"
      elements: [0, 1]
    is_user_editable: True
    value: 1
fn: !hla acquire_bite
