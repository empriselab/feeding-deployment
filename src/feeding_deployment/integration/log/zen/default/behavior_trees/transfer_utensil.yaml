name: Autogen
description: Autogenerated sequence node
type: Sequence
children:
- name: TransferUtensil
  description: Bring the utensil to the user's mouth for a bite.
  type: Behavior
  parameters:
  - name: Speed
    description: Speed of the robot during bringing the utensil to the user's mouth.
    is_user_editable: true
    space:
      type: Enum
      elements:
      - low
      - medium
      - high
    value: high
  - name: ReadyToInitiateTransferInteraction
    description: Interaction mode for ready to initiate transfer.
    is_user_editable: true
    space:
      type: Enum
      elements:
      - silent
      - voice
      - led
    value: voice
  - name: ReadyForTransferInteraction
    description: Interaction mode for ready to transfer.
    is_user_editable: true
    space:
      type: Enum
      elements:
      - silent
      - voice
      - led
    value: voice
  - name: InitiateTransferInteraction
    description: Interaction mode for transfer.
    is_user_editable: true
    space:
      type: Enum
      elements:
      - button
      - open_mouth
      - auto_timeout
      - headshake_user_generated
    value: open_mouth
  - name: TransferCompleteInteraction
    description: Interaction mode for transfer completion.
    is_user_editable: true
    space:
      type: Enum
      elements:
      - button
      - sense
      - auto_timeout
      - headshake_user_generated
    value: auto_timeout
  - name: OutsideMouthDistance
    description: Distance from the tool tip to the user's mouth.
    is_user_editable: true
    space:
      type: Box
      lower: 0.1
      upper: 0.2
    value: 0.15
  - name: TimeToWaitBeforeAutocontinue
    description: Autocontinue duration for re-selecting drinking transfer after a
      sip.
    is_user_editable: true
    space:
      type: Box
      lower: 5.0
      upper: 100.0
    value: 5.0
  fn: !hla transfer_utensil
- name: UserGeneratedNode1
  description: Move to retract position.
  type: Behavior
  parameters:
  - name: RetractPosition
    description: The retract position of the robot.
    is_user_editable: false
    space:
      type: Box
      lower:
      - -.inf
      - -2.41
      - -.inf
      - -2.66
      - -.inf
      - -2.23
      - -.inf
      upper:
      - .inf
      - 2.41
      - .inf
      - 2.66
      - .inf
      - 2.23
      - .inf
    value:
    - 0.0
    - -0.34903602299465675
    - -3.141591055693139
    - -2.5482592711638783
    - 0.0
    - -0.872688061814757
    - 1.57075917569769
  fn: !hla move_to_joint_positions