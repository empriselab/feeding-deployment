name: PickUtensil
description: Pick up the utensil from the tool mount.
type: Behavior
parameters:
- name: Speed
  description: Speed of the robot during picking up the utensil.
  is_user_editable: true
  space:
    type: Enum
    elements:
    - low
    - medium
    - high
  value: medium
fn: !hla pick_utensil